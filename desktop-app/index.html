<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>久财AI - 智能股票分析助手</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/chat.css">
  <link rel="stylesheet" href="styles/views.css">
  <link rel="stylesheet" href="styles/strategy.css">
  <link rel="stylesheet" href="styles/stock.css">
  <link rel="stylesheet" href="styles/portfolio.css">
  <link rel="stylesheet" href="styles/market.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 主容器 -->
  <div class="app-container">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <!-- 用户信息 -->
      <div class="user-profile">
        <div class="avatar">
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="user-info">
          <div class="username">投资者</div>
          <div class="user-status">在线</div>
        </div>
      </div>

      <!-- 导航菜单 -->
      <nav class="nav-menu">
        <div class="nav-item active" data-view="chat">
          <i class="fas fa-comments"></i>
          <span>智能分析</span>
        </div>
        <div class="nav-item" data-view="market">
          <i class="fas fa-chart-line"></i>
          <span>市场行情</span>
        </div>
        <div class="nav-item" data-view="stock">
          <i class="fas fa-chart-bar"></i>
          <span>个股分析</span>
        </div>
        <div class="nav-item" data-view="portfolio">
          <i class="fas fa-briefcase"></i>
          <span>投资组合</span>
        </div>
        <div class="nav-item" data-view="strategy">
          <i class="fas fa-lightbulb"></i>
          <span>策略回测</span>
        </div>
      </nav>

      <!-- 对话历史 -->
      <div class="chat-history-section">
        <div class="section-header">
          <span>历史对话</span>
          <button class="new-chat-btn" title="新对话">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <div class="chat-history-list" id="chatHistory">
          <!-- 对话历史将动态加载 -->
        </div>
      </div>

      <!-- 底部设置 -->
      <div class="sidebar-footer">
        <button class="settings-btn" title="设置">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 聊天视图 -->
      <div class="view-container active" id="chatView">
        <!-- 欢迎屏幕 -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-content">
            <h1 class="welcome-title">你好，投资者！开始智能股票分析</h1>
            <p class="welcome-subtitle">久财AI为您提供专业的股票分析和投资决策支持</p>
            
            <!-- 快捷功能卡片 -->
            <div class="quick-actions">
              <div class="action-card" data-action="market-overview">
                <i class="fas fa-chart-line"></i>
                <span>市场概览</span>
              </div>
              <div class="action-card" data-action="stock-search">
                <i class="fas fa-search"></i>
                <span>股票查询</span>
              </div>
              <div class="action-card" data-action="technical-analysis">
                <i class="fas fa-chart-area"></i>
                <span>技术分析</span>
              </div>
              <div class="action-card" data-action="news-sentiment">
                <i class="fas fa-newspaper"></i>
                <span>新闻舆情</span>
              </div>
              <div class="action-card" data-action="ai-prediction">
                <i class="fas fa-brain"></i>
                <span>AI预测</span>
              </div>
              <div class="action-card" data-action="risk-analysis">
                <i class="fas fa-shield-alt"></i>
                <span>风险评估</span>
              </div>
            </div>

            <!-- 功能标签 -->
            <div class="feature-tags">
              <div class="tag" data-tag="macd"><i class="fas fa-wave-square"></i> MACD分析</div>
              <div class="tag" data-tag="kdj"><i class="fas fa-chart-line"></i> KDJ指标</div>
              <div class="tag" data-tag="ma"><i class="fas fa-chart-simple"></i> 均线系统</div>
              <div class="tag" data-tag="volume"><i class="fas fa-bars"></i> 成交量分析</div>
              <div class="tag" data-tag="bollinger"><i class="fas fa-arrows-alt-v"></i> 布林带</div>
              <div class="tag" data-tag="rsi"><i class="fas fa-gauge-high"></i> RSI强弱</div>
              <div class="tag" data-tag="support"><i class="fas fa-level-up-alt"></i> 支撑位</div>
              <div class="tag" data-tag="resistance"><i class="fas fa-level-down-alt"></i> 压力位</div>
            </div>
          </div>
        </div>

        <!-- 对话区域 -->
        <div class="chat-area" id="chatArea" style="display: none;">
          <div class="messages-container" id="messagesContainer">
            <!-- 消息将动态添加到这里 -->
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
          <div class="input-container">
            <button class="attach-btn" title="附件">
              <i class="fas fa-paperclip"></i>
            </button>
            
            <div class="input-wrapper">
              <textarea 
                id="messageInput" 
                placeholder="请输入您的问题，例如：分析一下贵州茅台的走势" 
                rows="1"
              ></textarea>
            </div>

            <div class="input-actions">
              <button class="voice-btn" title="语音输入">
                <i class="fas fa-microphone"></i>
              </button>
              <button class="send-btn" id="sendBtn" title="发送">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>

          <!-- 底部工具栏 -->
          <div class="input-toolbar">
            <div class="toolbar-left">
              <button class="tool-btn" id="realtimeDataBtn">
                <i class="fas fa-sync-alt"></i>
                <span>实时数据</span>
              </button>
              <button class="tool-btn" id="technicalBtn">
                <i class="fas fa-chart-line"></i>
                <span>技术指标</span>
              </button>
              <button class="tool-btn" id="newsBtn">
                <i class="fas fa-newspaper"></i>
                <span>相关新闻</span>
              </button>
            </div>

            <div class="avatar-mini">
              <i class="fas fa-user-circle"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- 市场行情视图 -->
      <div class="view-container" id="marketView">
        <div class="market-overview">
          <h2><i class="fas fa-chart-line"></i> 市场行情概览</h2>
          <div class="market-indicators">
            <!-- 指数卡片将由market.js动态生成 -->
          </div>
          
          <!-- 热门板块 -->
          <div class="market-sectors">
            <!-- 板块数据将由market.js动态生成 -->
          </div>
        </div>
      </div>

      <!-- 个股分析视图 -->
      <div class="view-container" id="stockView">
        <div class="stock-analysis">
          <h2><i class="fas fa-chart-bar"></i> 个股分析</h2>
          <div class="stock-search-box">
            <input type="text" placeholder="输入股票代码或名称..." class="stock-input">
            <button class="search-btn"><i class="fas fa-search"></i> 搜索</button>
          </div>
        </div>
      </div>

      <!-- 投资组合视图 -->
      <div class="view-container" id="portfolioView">
        <div class="portfolio-management">
          <h2><i class="fas fa-briefcase"></i> 我的投资组合</h2>
          <div class="portfolio-summary">
            <p>暂无持仓数据</p>
          </div>
        </div>
      </div>

      <!-- 策略回测视图 -->
      <div class="view-container" id="strategyView">
        <div class="strategy-backtest">
          <h2><i class="fas fa-chart-line"></i> 策略回测</h2>
          
          <!-- 策略配置面板 -->
          <div class="strategy-config-panel">
            <div class="config-section">
              <h3><i class="fas fa-cog"></i> 回测配置</h3>
              
              <div class="config-form">
                <div class="form-row">
                  <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="backtest-stock" placeholder="例如: 600519" class="form-input">
                  </div>
                  
                  <div class="form-group">
                    <label>策略类型</label>
                    <select id="strategy-type" class="form-select">
                      <option value="ma">移动平均线策略 (MA)</option>
                      <option value="macd">MACD 策略</option>
                      <option value="kdj">KDJ 策略</option>
                      <option value="rsi">RSI 策略</option>
                      <option value="bollinger">布林带策略</option>
                    </select>
                  </div>
                </div>
                
                <div class="form-row">
                  <div class="form-group">
                    <label>开始日期</label>
                    <input type="date" id="start-date" class="form-input">
                  </div>
                  
                  <div class="form-group">
                    <label>结束日期</label>
                    <input type="date" id="end-date" class="form-input">
                  </div>
                </div>
                
                <div class="form-row">
                  <div class="form-group">
                    <label>初始资金 (元)</label>
                    <input type="number" id="initial-capital" value="100000" class="form-input">
                  </div>
                  
                  <div class="form-group">
                    <label>手续费率 (%)</label>
                    <input type="number" id="commission-rate" value="0.03" step="0.01" class="form-input">
                  </div>
                </div>
                
                <div class="form-row strategy-params" id="strategyParams">
                  <!-- 策略参数动态填充 -->
                  <div class="form-group">
                    <label>短期均线</label>
                    <input type="number" id="param-short" value="5" class="form-input">
                  </div>
                  
                  <div class="form-group">
                    <label>长期均线</label>
                    <input type="number" id="param-long" value="20" class="form-input">
                  </div>
                </div>
                
                <div class="form-actions">
                  <button class="btn-primary" id="runBacktestBtn">
                    <i class="fas fa-play"></i> 开始回测
                  </button>
                  <button class="btn-secondary" id="resetBacktestBtn">
                    <i class="fas fa-redo"></i> 重置
                  </button>
                </div>
              </div>
            </div>
          </div>
          
          <!-- 回测结果面板 -->
          <div class="backtest-results" id="backtestResults" style="display: none;">
            <h3><i class="fas fa-chart-bar"></i> 回测结果</h3>
            
            <!-- 关键指标 -->
            <div class="result-metrics">
              <div class="metric-card">
                <div class="metric-label">总收益率</div>
                <div class="metric-value positive" id="totalReturn">+0%</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-label">年化收益率</div>
                <div class="metric-value" id="annualReturn">0%</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-label">最大回撤</div>
                <div class="metric-value negative" id="maxDrawdown">0%</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-label">夏普比率</div>
                <div class="metric-value" id="sharpeRatio">0.00</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-label">胜率</div>
                <div class="metric-value" id="winRate">0%</div>
              </div>
              
              <div class="metric-card">
                <div class="metric-label">交易次数</div>
                <div class="metric-value" id="tradeCount">0</div>
              </div>
            </div>
            
            <!-- 收益曲线图 -->
            <div class="result-chart">
              <h4>收益曲线</h4>
              <canvas id="equityCurve" width="800" height="300"></canvas>
            </div>
            
            <!-- 交易记录 -->
            <div class="trade-history">
              <h4>交易记录</h4>
              <div class="trade-table-wrapper">
                <table class="trade-table">
                  <thead>
                    <tr>
                      <th>日期</th>
                      <th>操作</th>
                      <th>价格</th>
                      <th>数量</th>
                      <th>金额</th>
                      <th>手续费</th>
                      <th>收益率</th>
                    </tr>
                  </thead>
                  <tbody id="tradeTableBody">
                    <!-- 交易记录动态填充 -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 加载脚本 -->
  <script src="scripts/api-config.js"></script>
  <script src="scripts/api-client.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/app.js"></script>
  <script src="scripts/chat.js"></script>
  <script src="scripts/strategy.js"></script>
  <script src="scripts/stock.js"></script>
  <script src="scripts/portfolio.js"></script>
  <script src="scripts/market.js"></script>
</body>
</html>
